# ============================================================
# Employee Management System - Application Configuration
# ============================================================

# --- Database Connection ---
# In Kubernetes, the hostname 'postgres' is the Service name
# Change 'postgres' to 'localhost' for local development
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
# validate: checks table structure matches entity (safe for production)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- Server ---
server.port=8080
