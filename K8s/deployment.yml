apiVersion: apps/v1
kind: Deployment
metadata:
  name: tier-1-frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: mugesh202006/employee-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80


